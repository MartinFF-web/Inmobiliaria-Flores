<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inmobiliaria Flores</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
    --negro:#222;
    --gris:#666;
    --rojo:#9b2c2c;
    --arena:#f7f6f3;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter', sans-serif;
    background:var(--arena);
    color:var(--negro);
    line-height:1.7;
}

/* NAV */
nav{
    position:fixed;
    width:100%;
    top:0;
    left:0;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:25px 10%;
    background:white;
    border-bottom:1px solid #eee;
    z-index:1000;
}

.logo{
    font-family:'Noto Serif JP', serif;
    font-size:22px;
    letter-spacing:2px;
}

nav ul{
    list-style:none;
    display:flex;
    gap:40px;
}

nav a{
    text-decoration:none;
    color:var(--negro);
    font-size:14px;
    letter-spacing:2px;
    transition:0.3s;
}

nav a:hover,
nav a.active{
    color:var(--rojo);
}

.menu-toggle{
    display:none;
    font-size:26px;
    cursor:pointer;
}

/* HERO */
.hero{
    margin-top:100px;
    height:90vh;
    background:url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c') center/cover no-repeat;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
}

.hero-content{
    max-width:700px;
}

.hero h1{
    font-family:'Noto Serif JP', serif;
    font-size:48px;
    font-weight:600;
    letter-spacing:3px;
}

.hero p{
    margin-top:20px;
    font-weight:300;
    font-size:18px;
    color:#444;
}

.hero button{
    margin-top:40px;
    padding:12px 35px;
    border:1px solid var(--negro);
    background:transparent;
    cursor:pointer;
    letter-spacing:2px;
    transition:0.3s;
}

.hero button:hover{
    background:var(--negro);
    color:white;
}

footer{
    text-align:center;
    padding:60px 20px;
    font-size:14px;
    color:var(--gris);
}

@media(max-width:768px){
    nav ul{
        position:absolute;
        top:80px;
        right:0;
        background:white;
        width:100%;
        flex-direction:column;
        align-items:center;
        gap:30px;
        padding:40px 0;
        display:none;
        border-top:1px solid #eee;
    }

    nav ul.active{
        display:flex;
    }

    .menu-toggle{
        display:block;
    }

    .hero h1{
        font-size:34px;
    }
}
</style>
</head>
<body>

<nav>
    <div class="logo">Inmobiliaria Flores</div>
    <div class="menu-toggle" id="menu-toggle">☰</div>
    <ul id="menu">
        <li><a href="index.html" class="active">Inicio</a></li>
        <li><a href="propiedades.html">Propiedades</a></li>
        <li><a href="nosotros.html">Nosotros</a></li>
        <li><a href="contacto.html">Contacto</a></li>
    </ul>
</nav>

<section class="hero">
    <div class="hero-content">
        <h1>Equilibrio y Patrimonio</h1>
        <p>Propiedades seleccionadas con visión y precisión.</p>
        <button onclick="window.location.href='propiedades.html'">
            Explorar propiedades
        </button>
    </div>
</section>

<footer>
    © 2026 Inmobiliaria Flores — Diseño minimalista
</footer>

<script>
const toggle = document.getElementById("menu-toggle");
const menu = document.getElementById("menu");

toggle.addEventListener("click", () => {
    menu.classList.toggle("active");
});
</script>

</body>
</html>
