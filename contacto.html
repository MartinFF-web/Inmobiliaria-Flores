<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contacto | Inmobiliaria Flores</title>
<link rel="icon" type="image/png" href="favicon.png">

<style>
body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background:#0a2a43;
    color:white;
}

/* HEADER */
header{
    position:fixed;
    width:100%;
    top:0;
    left:0;
    padding:15px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(10,42,67,0.95);
    z-index:1000;
}

.logo{
    display:flex;
    align-items:center;
    gap:12px;
    text-decoration:none;
}

.logo img{
    height:45px;
}

.logo h1{
    margin:0;
    font-size:22px;
    color:white;
}

nav ul{
    list-style:none;
    display:flex;
    gap:30px;
    margin:0;
    padding:0;
}

nav a{
    text-decoration:none;
    color:white;
    font-weight:500;
    transition:0.3s;
}

nav a:hover{
    color:#c59d5f;
}

/* HERO */
.hero{
    height:100vh;
    background:linear-gradient(rgba(10,42,67,0.8), rgba(10,42,67,0.8)),
    url('https://images.unsplash.com/photo-1507089947368-19c1da9775ae');
    background-size:cover;
    background-position:center;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.hero h2{
    font-size:42px;
    margin-bottom:20px;
}

.hero p{
    max-width:600px;
    margin-bottom:30px;
    font-size:18px;
}

/* FORM */
form{
    width:100%;
    max-width:500px;
}

input, textarea{
    width:100%;
    padding:14px;
    margin:10px 0;
    border:none;
    border-radius:5px;
    font-size:15px;
}

button{
    width:100%;
    padding:14px;
    background:#c59d5f;
    border:none;
    border-radius:5px;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#b8863b;
}

footer{
    background:#081f32;
    text-align:center;
    padding:25px;
}
</style>
</head>

<body>

<header>
<a href="index.html" class="logo">
<img src="logo.png">
<h1>Inmobiliaria Flores</h1>
</a>

<nav>
<ul>
<li><a href="index.html">Inicio</a></li>
<li><a href="propiedades.html">Propiedades</a></li>
<li><a href="nosotros.html">Nosotros</a></li>
<li><a href="contacto.html">Contacto</a></li>
</ul>
</nav>
</header>

<section class="hero">
<h2>Contáctanos</h2>
<p>Estamos listos para ayudarte a encontrar tu próxima propiedad.</p>

<form>
<input type="text" placeholder="Nombre completo" required>
<input type="email" placeholder="Correo electrónico" required>
<textarea rows="4" placeholder="Escribe tu mensaje..." required></textarea>
<button type="submit">Enviar mensaje</button>
</form>

</section>

<footer>
© 2026 Inmobiliaria Flores | Todos los derechos reservados
</footer>

</body>
</html>
